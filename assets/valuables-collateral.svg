<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Valuables and assets as collateral">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc66"/>
      <stop offset="50%" stop-color="#f2994a"/>
      <stop offset="100%" stop-color="#c9782a"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e68600"/>
      <stop offset="50%" stop-color="#ffcc66"/>
      <stop offset="100%" stop-color="#e68600"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- subtle arc pattern -->
  <g fill="none" stroke="#222" stroke-width="0.8" opacity="0.6">
    <circle cx="520" cy="320" r="40"/>
    <circle cx="520" cy="320" r="70"/>
    <circle cx="520" cy="320" r="100"/>
    <circle cx="80" cy="80" r="30"/>
    <circle cx="80" cy="80" r="55"/>
  </g>
  <!-- gold bars -->
  <g filter="url(#glow)">
    <rect x="120" y="200" width="140" height="48" rx="6" fill="url(#goldBar)" transform="rotate(-8 190 224)"/>
    <rect x="155" y="168" width="130" height="44" rx="6" fill="url(#goldBar)" transform="rotate(-4 220 190)"/>
    <rect x="190" y="138" width="120" height="40" rx="6" fill="url(#goldBar)"/>
  </g>
  <!-- coins stack -->
  <g>
    <ellipse cx="400" cy="268" rx="52" ry="14" fill="#8a5a20" opacity="0.5"/>
    <ellipse cx="400" cy="252" rx="52" ry="14" fill="url(#gold)"/>
    <ellipse cx="400" cy="236" rx="52" ry="14" fill="url(#gold)"/>
    <ellipse cx="400" cy="220" rx="52" ry="14" fill="url(#gold)"/>
    <ellipse cx="400" cy="204" rx="52" ry="14" fill="#ffcc66"/>
    <text x="400" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#5a3a10">�</text>
  </g>
  <!-- jewellery ring -->
  <circle cx="280" cy="118" r="36" fill="none" stroke="url(#gold)" stroke-width="10"/>
  <circle cx="280" cy="118" r="14" fill="#1a1410"/>
  <path d="M268 98 L280 78 L292 98" fill="url(#gold)"/>
  <!-- watch / electronics hint -->
  <rect x="430" y="95" width="88" height="72" rx="10" fill="#1a1a1a" stroke="#f2994a" stroke-width="2"/>
  <rect x="442" y="108" width="64" height="40" rx="4" fill="#2a2218"/>
  <line x1="452" y1="118" x2="496" y2="118" stroke="#f2994a" stroke-width="2" opacity="0.6"/>
  <line x1="452" y1="128" x2="480" y2="128" stroke="#f2994a" stroke-width="2" opacity="0.4"/>
  <!-- orange dots -->
  <g fill="#f2994a">
    <circle cx="48" cy="320" r="5"/><circle cx="68" cy="320" r="5"/>
    <circle cx="48" cy="340" r="5"/><circle cx="68" cy="340" r="5"/>
  </g>
  <text x="300" y="355" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#f2994a" letter-spacing="3">GOLD � JEWELLERY � ASSETS</text>
</svg>
